worker_processes 1;
error_log  "logs/error.log" debug;
pid logs/tengine-proxy.pid;

events {
    worker_connections  10240;
}

processes {
        process strategy {}
}

xquic_log   "logs/xquic.log" info;
cc_defense_log   "logs/cc_defense.log" info;

http {
    access_log  off;
    
    xquic_ssl_certificate ../../../tests/nginx-tests/cases/certs/server.crt;
    xquic_ssl_certificate_key ../../../tests/nginx-tests/cases/certs/server.key;
    xquic_log_file logs/xquic_log;
    xquic_log_level info;
    xquic_max_concurrent_connection_cnt 150000;
    xquic_max_qps 15000;
    xquic_max_cps 5000;

    xquic_enable_multipath 1;
    xquic_multipath_scheduler minrtt;
    xquic_mp_enable_reinjection 2;
    xquic_reinjection_control deadline;
    xquic_reinj_flexible_deadline_srtt_factor 2.0;

    server {
        listen 2081 xquic reuseport rcvbuf=5242880;

        server_name *.multicert1.com;

        ssl_certificate      ../../../../tests/nginx-tests/cases/certs/multicert1.crt;
        ssl_certificate_key  ../../../../tests/nginx-tests/cases/certs/multicert1.key;

        ssl_keyless off;
    }

    server {
        listen 2082 xquic reuseport rcvbuf=5242880;

        server_name *.multicert2.com;

        ssl_certificate      ../../../../tests/nginx-tests/cases/certs/multicert2.crt;
        ssl_certificate_key  ../../../../tests/nginx-tests/cases/certs/multicert2.key;

        ssl_keyless off;
    }


    # server block on 3081 for fuzzy match with multicert1
    server {
        listen 3081 xquic reuseport rcvbuf=5242880;

        server_name *.multicert1.com;

        ssl_certificate      ../../../../tests/nginx-tests/cases/certs/multicert1.crt;
        ssl_certificate_key  ../../../../tests/nginx-tests/cases/certs/multicert1.key;

        ssl_keyless off;
    }
    # server block on 3081 for fuzzy match with multicert2
    server {
        listen 3081 xquic;

        server_name *.multicert2.com;

        ssl_certificate      ../../../../tests/nginx-tests/cases/certs/multicert2.crt;
        ssl_certificate_key  ../../../../tests/nginx-tests/cases/certs/multicert2.key;

        ssl_keyless off;
    }


    # server block on 3082 for fuzzy match with multicert1
    server {
        listen 3082 xquic reuseport rcvbuf=5242880;

        server_name "~^multicert1\.com$";

        ssl_certificate      ../../../../tests/nginx-tests/cases/certs/multicert1.crt;
        ssl_certificate_key  ../../../../tests/nginx-tests/cases/certs/multicert1.key;

        ssl_keyless off;
    }
    # server block on 3082 for fuzzy match with multicert2
    server {
        listen 3082 xquic;

        server_name "~^multicert2\.com$";

        ssl_certificate      ../../../../tests/nginx-tests/cases/certs/multicert2.crt;
        ssl_certificate_key  ../../../../tests/nginx-tests/cases/certs/multicert2.key;

        ssl_keyless off;
    }


    # keyless protection
    server {
        listen 4081 ssl default_server reuseport rcvbuf=5242880;

        server_name *.multicert2.com;

        ssl_certificate      ../../../../tests/nginx-tests/cases/certs/server.crt;
        ssl_certificate      ../../../../tests/nginx-tests/cases/certs/server.crt;

        ssl_keyless on;
        ssl_keyless_server zb.keycenter.taobao.org:443;
    }
}