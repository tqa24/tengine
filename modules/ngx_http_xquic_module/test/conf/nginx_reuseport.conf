
worker_processes 4;

worker_shutdown_timeout 90s;

error_log  "logs/error.log" debug;
pid logs/tengine-proxy.pid;
#user admin;
events {
    worker_connections  10240;
}

processes {
        process strategy {}
}

xquic_log   "logs/xquic.log" info;
cc_defense_log   "logs/cc_defense.log" info;

http {
    access_log off;
    underscores_in_headers  on;
 
    xquic_ssl_certificate ../../../tests/nginx-tests/cases/certs/server.crt;
    xquic_ssl_certificate_key ../../../tests/nginx-tests/cases/certs/server.key;
    xquic_log_file logs/xquic_log;
    xquic_intercom_socket_rcvbuf 2097152;
    xquic_intercom_socket_sndbuf 2097152;

    server {
        listen 2080 deferred default_server reuseport default_server;
        listen 2443 deferred ssl https_allow_http reuseport default_server;
        listen 2081 xquic reuseport rcvbuf=5242880;
        listen 2445 xquic reuseport rcvbuf=5242880;
        listen [::]:2081 xquic reuseport rcvbuf=5242880;
        listen [::]:2445 xquic reuseport rcvbuf=5242880;
        server_name acs.waptest.taobao.com;

        ssl_certificate ../../../../tests/nginx-tests/cases/certs/server.crt;
        ssl_certificate_key ../../../../tests/nginx-tests/cases/certs/server.key;
        
        location / {
            content_by_lua '
              ngx.header.current_pid = ngx.var.pid;
              ngx.say("HTTP_OK");
            ';
        }
    }
}
