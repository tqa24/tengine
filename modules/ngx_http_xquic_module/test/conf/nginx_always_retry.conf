worker_processes 1;
error_log  "logs/error.log" info;
pid logs/tengine-proxy.pid;

events {
    worker_connections  10240;
}

processes {
        process strategy {}
}



xquic_log   "pipe:rollback logs/cronolog/xquic.log baknum=4 maxsize=10240 interval=1440 offset=0h adjust=600 suitpath=logs/cronolog/%Y/%m/%Y-%m-%d-xquic_log" info;
cc_defense_log   "pipe:rollback logs/cronolog/cc_defense.log baknum=4 maxsize=10240 interval=1440 offset=0h adjust=600 suitpath=logs/cronolog/%Y/%m/%Y-%m-%d-cc_defense_log" info;
http {
    access_log logs/access.log;

    underscores_in_headers  on;

    xquic_ssl_certificate ../../../tests/nginx-tests/cases/certs/server.crt;
    xquic_ssl_certificate_key ../../../tests/nginx-tests/cases/certs/server.key;
    xquic_log_file logs/xquic_log;
    xquic_log_level info;
    xquic_max_concurrent_connection_cnt 150000;
    xquic_max_qps 15000;
    xquic_max_cps 5000;

    xquic_cc_defense_switch on;
    xquic_retry_packet_always on;
    xquic_cc_defense_conn_log_threshold 5;
    xquic_cc_defense_conn_close_threshold 100;
    xquic_cc_defense_qps_log_threshold 20;
    xquic_cc_defense_qps_reject_threshold 100;
    xquic_cc_stat_hash_size 8192;
    xquic_cc_stat_top_size 5;
    xquic_cc_stat_cycle 1;
    xquic_cc_stat_conn_top_min_threshold 5;
    xquic_cc_stat_qps_top_min_threshold 5;
    
    xquic_cc_defense_cps_log_threshold 2;
    xquic_init_conn_idle_timeout 1;
    xquic_cc_defense_half_conn_threshold 5;
    xquic_cc_defense_half_cps_threshold 3;
    xquic_cc_defense_half_conn_max_threshold 10;
    xquic_cc_defense_half_cps_max_threshold 5;
    xquic_cc_defense_half_conn_ip_threshold 2;


    server {
        listen 2081 xquic reuseport rcvbuf=5242880;
        listen 2445 xquic reuseport rcvbuf=5242880;
        listen [::]:2081 xquic reuseport rcvbuf=5242880;
        listen [::]:2445 xquic reuseport rcvbuf=5242880;
 
        server_name acs.waptest.taobao.com;
        return 200;
    }
}
