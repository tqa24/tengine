worker_processes 1;
error_log  "logs/error.log" warn;
pid logs/tengine-proxy.pid;

events {
    worker_connections  10240;
}

processes {
        process strategy {}
}

xquic_log   "logs/xquic.log" info;

http {
    access_log  off;

    xquic_ssl_certificate ../../../tests/nginx-tests/cases/certs/server.crt;
    xquic_ssl_certificate_key ../../../tests/nginx-tests/cases/certs/server.key;
    xquic_log_file logs/xquic_log;
    xquic_log_level info;
    
    # set max bidirectional and unidirectional stream counts
    xquic_max_streams_bidi 20;
    xquic_max_streams_uni 20;

    # define backend server (used for delayed responses)
    upstream slow_backend {
        server 127.0.0.1:8080;
    }

    # HTTP/3 frontend server
    server {
        listen 2081 xquic reuseport rcvbuf=5242880;

        server_name test.taobao.com;

        # allow large request bodies
        client_max_body_size 100m;
        client_body_buffer_size 10m;

        location /  {
            # proxy to backend that handles the delay
            proxy_pass http://slow_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # proxy buffering settings
            proxy_request_buffering on;
        }
    }

    # plain HTTP backend server (implements the delay logic)
    server {
        listen 8080;
        
        location / {
            content_by_lua '
              ngx.sleep(2)
              ngx.say("HTTP3_OK")
            ';
        }
    }
}
