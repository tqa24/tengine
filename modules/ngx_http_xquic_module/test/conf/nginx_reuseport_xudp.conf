
worker_processes 4;
error_log  "logs/error.log" debug;
pid logs/tengine-proxy.pid;
#user admin;
events {
    worker_connections  10240;
}

processes {
        process strategy {}
}

xudp_core_path /usr/lib64/xquic_xdp/kern_xquic.o;
xudp_rcvnum 2048;
xudp_sndnum 4096;
xudp_no_tx on;

xquic_log   "logs/xquic.log" info;
cc_defense_log   "logs/cc_defense.log" info;

worker_shutdown_timeout 90s;
http {
    access_log off;
    underscores_in_headers  on;
 
    xquic_ssl_certificate ../../../tests/nginx-tests/cases/certs/server.crt;
    xquic_ssl_certificate_key ../../../tests/nginx-tests/cases/certs/server.key;
    xquic_log_file logs/xquic_log;

    server {
        listen 2081 xquic xudp reuseport rcvbuf=5242880;
        listen 2445 xquic xudp reuseport rcvbuf=5242880;
        listen 2446 xquic xudp reuseport rcvbuf=5242880;
        
        server_name acs.waptest.taobao.com;
        
        location / {
            content_by_lua '
              ngx.header.current_pid = ngx.var.pid;
              ngx.say("HTTP_OK");
            ';
        }
    }
}
